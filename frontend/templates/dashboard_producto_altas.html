{% extends "base_admin.html" %}
{% block title %}Dashboard Agregar Producto{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{url_for('static', filename='styles/dashboard_producto_abm.css')}}">
{% endblock %}
{% block contenido %}
<div class="contenedor_producto">
    <h2>Agregar nuevo producto</h2>
    <div class="contenedor_form">
        <form action="{{url_for('dashboard.agregar_producto')}}" method="post">
            <div class="form_producto">
                <label for="nombre_producto">Nombre:</label>
                <input type="text" id="nombre_producto" name="fproducto_nombre" placeholder="Ingresar nombre del producto...">
                <label for="precio_producto">Precio:</label>
                <input type="number" id="precio_producto" name="fproducto_precio" placeholder="Ingresar precio del producto...">
                <label for="stock_producto">Stock:</label>
                <input type="number" id="stock_producto" name="fproducto_stock" placeholder="Ingresar stock del producto...">
                <label for="tipo_producto">Categoria:</label>
                <input type="text" id="tipo_producto" name="fproducto_tipo" placeholder="Ingresar tipo de producto">
                <label for="local_producto">Local:</label>
                <input type="number" id="local_producto" name="fproducto_local_id" placeholder="Ingresar id del local correspondiente al producto...">
            </div>
            <button type="submit" class="form_bttn_agregar">Agregar producto</button>
        </form>
    </div>
</div>
{% endblock %}
